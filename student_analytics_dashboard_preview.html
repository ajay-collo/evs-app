
<style>
.s-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 16px; }
.s-metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 16px; }
.s-label { font-size: 12px; color: var(--color-text-secondary); margin: 0 0 4px; }
.s-value { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin: 0; }
.sec-lbl { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin: 0 0 10px; text-transform: uppercase; letter-spacing: .04em; }
</style>

<div style="padding:1rem 0;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <div>
      <p style="font-size:16px;font-weight:500;margin:0;color:var(--color-text-primary)">My analytics</p>
      <p style="font-size:13px;color:var(--color-text-secondary);margin:0">Aanya Sharma  •  Class 10-A</p>
    </div>
    <span style="font-size:12px;background:#EAF3DE;color:#27500A;padding:4px 12px;border-radius:99px;font-weight:500;">Excellent performer</span>
  </div>

  <!-- Metrics -->
  <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px;">
    <div class="s-metric"><p class="s-label">Tasks completed</p><p class="s-value">11 / 12</p></div>
    <div class="s-metric"><p class="s-label">Attendance</p><p class="s-value">95%</p></div>
    <div class="s-metric"><p class="s-label">Hours logged</p><p class="s-value">18 hrs</p></div>
    <div class="s-metric"><p class="s-label">Approval rate</p><p class="s-value" style="color:#1D9E75;">91%</p></div>
  </div>

  <!-- Row 1 -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
    <div class="s-card">
      <p class="sec-lbl">My score over time</p>
      <div style="position:relative;height:190px;"><canvas id="myScore"></canvas></div>
    </div>
    <div class="s-card">
      <p class="sec-lbl">Activity type breakdown</p>
      <div style="display:flex;align-items:center;gap:16px;">
        <div style="position:relative;height:160px;width:160px;flex-shrink:0;"><canvas id="typeChart"></canvas></div>
        <div style="display:flex;flex-direction:column;gap:8px;font-size:12px;color:var(--color-text-secondary);">
          <span style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:2px;background:#1D9E75;display:inline-block"></span>Tree plantation</span>
          <span style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:2px;background:#185FA5;display:inline-block"></span>Waste mgmt</span>
          <span style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:2px;background:#EF9F27;display:inline-block"></span>Water conservation</span>
          <span style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:2px;background:#D85A30;display:inline-block"></span>Composting</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Row 2 -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
    <div class="s-card">
      <p class="sec-lbl">Attendance per month</p>
      <div style="position:relative;height:170px;"><canvas id="myAtt"></canvas></div>
    </div>
    <div class="s-card">
      <p class="sec-lbl">Task completion status</p>
      <div style="position:relative;height:170px;"><canvas id="myComp"></canvas></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
new Chart(document.getElementById('myScore'), {
  type:'line',
  data:{
    labels:['Jan','Feb','Mar','Apr'],
    datasets:[{label:'Score',data:[72,80,85,91],borderColor:'#1D9E75',backgroundColor:'#E1F5EE',fill:true,tension:.4,pointRadius:5,pointBackgroundColor:'#1D9E75'}]
  },
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{y:{min:50,max:100,ticks:{callback:v=>v+'%',font:{size:11}}},x:{ticks:{font:{size:11}}}}}
});

new Chart(document.getElementById('typeChart'), {
  type:'doughnut',
  data:{
    labels:['Tree plantation','Waste mgmt','Water conservation','Composting'],
    datasets:[{data:[4,3,2,2],backgroundColor:['#1D9E75','#185FA5','#EF9F27','#D85A30'],borderWidth:0,hoverOffset:4}]
  },
  options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false}}}
});

new Chart(document.getElementById('myAtt'), {
  type:'bar',
  data:{
    labels:['Jan','Feb','Mar','Apr'],
    datasets:[{label:'Attendance %',data:[90,88,100,95],backgroundColor:['#B5D4F4','#B5D4F4','#185FA5','#185FA5'],borderRadius:4}]
  },
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:11}}},x:{ticks:{font:{size:11}}}}}
});

new Chart(document.getElementById('myComp'), {
  type:'bar',
  data:{
    labels:['Approved','Pending','Rejected'],
    datasets:[{data:[10,1,0],backgroundColor:['#1D9E75','#EF9F27','#E24B4A'],borderRadius:6}]
  },
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{y:{beginAtZero:true,max:12,ticks:{stepSize:2,font:{size:11}}},x:{ticks:{font:{size:11}}}}}
});
</script>
